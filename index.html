<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trend & Product Hunter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Trend Hunter Dashboard 🚀</h1>
        
        <!-- Correction du point faible : Ajout du contexte d'origine des données -->
        <p style="text-align: center; color: #8892b0; font-size: 0.85em; margin: -10px 0 25px 0; font-style: italic;">
            Analyse algorithmique autonome connectée aux API de sourcing mondial. Mise à jour horaire.
        </p>

        <div class="card">
            <p><strong>Analyse :</strong> <span id="flux-titre">Recherche en cours...</span></p>
            <p><strong>Potentiel TikTok/Shorts :</strong> <span id="viral-statut">Calcul...</span></p>
            
            <div style="text-align: center; margin: 15px 0;">
                <img id="produit-image" src="" alt="Aperçu du produit" style="max-width: 140px; border-radius: 12px; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3); margin: 0 auto;">
            </div>

            <p><strong>Produit Gagnant :</strong> <a id="produit-details" href="#" target="_blank" style="color: #64ffda; text-decoration: underline; font-weight: bold;">Sourcing...</a></p>
            <p class="date-maj">Vérifié à : <span id="maj-heure">--:--</span></p>
        </div>
    </div>
</body>
</html>
