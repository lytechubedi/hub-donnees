<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trend & Product Hunter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Trend Hunter Dashboard 🚀</h1>
        
        <p style="text-align: center; color: #8892b0; font-size: 0.85em; margin: -10px 0 25px 0; font-style: italic;">
            Analyse algorithmique autonome connectée aux API de sourcing mondial. Mise à jour horaire.
        </p>

        <!-- Zone dynamique où les 5 cartes vont s'injecter -->
        <div id="conteneur-produits">
            <p style="text-align: center; color: #64ffda;">Sourcing des tendances mondiales en cours...</p>
        </div>

        <p class="date-maj" style="text-align: center; margin-top: 20px;">Vérifié à : <span id="maj-heure">--:--</span></p>
    </div>

    <script src="script.js?v=2"></script>
</body>
</html>
