name: BOA Cron Auto

on:
  schedule:
    - cron: '0 */3 * * *' # Se lance automatiquement toutes les 3 heures
  workflow_dispatch: # Te permet de le lancer manuellement depuis ton téléphone

permissions:
  contents: write # Donne le droit à GitHub d'enregistrer les données

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v4

      - name: Configurer Python sur le serveur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Lancer le robot de sourcing e-commerce
        run: python scripts/fetch_ecom.py

      - name: Enregistrer les nouveaux produits trouvés
        run: |
          git config --global user.name "BOA-Bot"
          git config --global user.email "bot@businessopportunityafrica.com"
          git add data/ecom_products.json
          git diff-index --quiet HEAD || git commit -m "Mise à jour automatique des produits 🔥"
          git push
